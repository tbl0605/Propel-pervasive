name: PEAR packages

on:
  push:
  release:
    types: [published]

concurrency:
  group: pear-package-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Last stable Phing 2.x release. Phing 3.x is not usable here (see run_pear_package_build.sh).
  PHING_VERSION: 2.17.4
  PHING_PHAR: ${{ github.workspace }}/test/tools/phing-phars/phing-2.17.4.phar

jobs:
  build:
    name: Build PEAR packages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2.37.2
        with:
          # PHP 7.4: pear/pear_packagefilemanager uses $var{0} syntax removed in PHP 8.0.
          # Phing is pinned to 2.17.x (see test/tools/run_pear_package_build.sh).
          php-version: '7.4'
          tools: composer:v2
          extensions: dom, json, pdo, xml, xsl, mbstring, tokenizer
          coverage: none
          # error_reporting=22517 = E_ALL without warnings, notices, strict, and deprecations.
          # Phing 2 registers a PHP error handler that fails the build on those levels.
          ini-values: error_reporting=22517, display_errors=Off

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: pear-php74-composer-${{ hashFiles('composer.json') }}
          restore-keys: |
            pear-php74-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Cache Phing PHAR
        id: phing-phar-cache
        uses: actions/cache@v5
        with:
          path: test/tools/phing-phars/phing-${{ env.PHING_VERSION }}.phar
          key: phing-${{ env.PHING_VERSION }}-phar

      - name: Download Phing PHAR
        if: steps.phing-phar-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p test/tools/phing-phars
          curl -fsSL -o "test/tools/phing-phars/phing-${PHING_VERSION}.phar" \
            "https://github.com/phingofficial/phing/releases/download/${PHING_VERSION}/phing-${PHING_VERSION}.phar"

      - name: Determine package version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
            STATE="stable"
            LABEL="${VERSION}"
          else
            SHORT_SHA="${GITHUB_SHA:0:7}"
            BASE="$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "X.Y.Z")"
            MA="${BASE%%.*}"
            REST="${BASE#*.}"
            MI="${REST%%.*}"
            PA="${REST#*.}"
            DEV_NUM="$(git rev-list --count HEAD)"
            # PEAR accepts X.Y.ZdevN (numeric suffix only, no hyphens).
            VERSION="${MA}.${MI}.${PA}dev${DEV_NUM}"
            STATE="devel"
            LABEL="${VERSION}-${SHORT_SHA}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "state=${STATE}" >> "$GITHUB_OUTPUT"
          echo "label=${LABEL}" >> "$GITHUB_OUTPUT"
          echo "Building propel_generator and propel_runtime ${VERSION} (${STATE})"

      - name: Build generator PEAR package
        run: |
          chmod +x ../../test/tools/run_pear_package_build.sh
          ../../test/tools/run_pear_package_build.sh \
            -f build-pear-package.xml \
            -Dversion="${{ steps.meta.outputs.version }}" \
            -Dstate="${{ steps.meta.outputs.state }}"
        working-directory: generator/pear

      - name: Build runtime PEAR package
        run: |
          chmod +x ../../test/tools/run_pear_package_build.sh
          ../../test/tools/run_pear_package_build.sh \
            -f build-pear-package.xml \
            -Dversion="${{ steps.meta.outputs.version }}" \
            -Dstate="${{ steps.meta.outputs.state }}"
        working-directory: runtime/pear

      - name: Collect package artifacts
        run: |
          mkdir -p dist/pear
          cp generator/pear/build/*.tgz dist/pear/
          cp runtime/pear/build/*.tgz dist/pear/
          cp generator/pear/build/package.xml dist/pear/propel_generator-package.xml
          cp runtime/pear/build/package.xml dist/pear/propel_runtime-package.xml
          ls -la dist/pear/

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v5
        with:
          name: pear-packages-${{ steps.meta.outputs.label }}
          path: dist/pear/
          if-no-files-found: error

      - name: Attach packages to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: dist/pear/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
