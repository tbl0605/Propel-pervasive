# Minimal Propel project for reset_tests fixture rebuild.
# The config/, behavior/, and platform/ subdirs are standalone test helpers.

propel.project = generator
propel.targetPackage = generator

propel.database = mysql
propel.database.url = mysql:dbname=test
propel.mysql.tableType = InnoDB
propel.disableIdentifierQuoting = true
propel.schema.autoPrefix = true

# For MySQL or Oracle, you also need to specify username & password
propel.database.user = root
#propel.database.password = [db password]
